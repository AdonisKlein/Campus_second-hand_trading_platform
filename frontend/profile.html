<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>个人中心 - 校园二手交易平台</title>
    <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body>
    <header class="topbar">
        <a class="brand" href="index.html">校园二手交易</a>
        <nav>
            <a href="publish.html">发布物品</a>
            <a href="orders.html">订单管理</a>
            <a href="profile.html">个人中心</a>
            <a href="admin.html">管理中心</a>
        </nav>
    </header>

    <main class="layout narrow">
        <h1>个人中心</h1>

        <!-- Login form -->
        <form class="form-panel" id="loginForm">
            <h2>登录</h2>
            <div class="login-tabs" role="group" aria-label="登录方式">
                <button type="button" class="active" data-login-type="username">用户名登录</button>
                <button type="button" class="secondary" data-login-type="email">邮箱登录</button>
            </div>
            <input type="hidden" name="loginType" value="username">
            <label id="usernameLoginField">用户名<input name="username" required></label>
            <label id="emailLoginField" style="display:none;">邮箱<input name="email" type="email"></label>
            <label>密码<input name="password" type="password" required></label>
            <button type="submit">登录</button>
            <p class="form-message" id="loginMessage"></p>
            <p class="small">
                如无账号，点击 <a href="register.html">前往注册</a>
                &ensp;|&ensp;
                <a href="#" id="forgotPasswordLink">忘记密码</a>
            </p>
        </form>

        <!-- Forgot password form -->
        <form class="form-panel" id="forgotPasswordForm" style="display:none;">
            <h2>忘记密码</h2>

            <!-- Step 1: send code -->
            <div id="fpStep1">
                <label>邮箱<input name="email" type="email" id="fpEmail" required placeholder="请输入注册时使用的邮箱"></label>
                <div class="inline-field">
                    <button type="button" id="fpSendCodeBtn">发送验证码</button>
                    <span id="fpCountdown" class="small"></span>
                </div>
            </div>

            <!-- Step 2: reset password -->
            <div id="fpStep2" style="display:none;">
                <div class="inline-field">
                    <label>验证码<input name="code" maxlength="6" placeholder="6位数字" required></label>
                </div>
                <label>新密码<input name="newPassword" type="password" placeholder="6-12位字母和数字" required></label>
                <label>确认新密码<input name="confirmPassword" type="password" placeholder="再次输入新密码" required></label>
                <button type="submit">重置密码</button>
            </div>

            <p class="form-message" id="fpMessage"></p>
            <p class="small"><a href="#" id="fpBackToLogin">返回登录</a></p>
        </form>

        <!-- Profile view / edit (shown when logged in) -->
        <section id="profileSection" class="form-panel" style="display:none;">
            <h2>我的资料</h2>
            <div id="profileView">
                <p>用户名：<span id="viewUsername"></span></p>
                <p>昵称：<span id="viewNickname"></span></p>
                <p>联系方式（手机号）：<span id="viewPhone"></span></p>
                <p>邮箱：<span id="viewEmail"></span></p>
            </div>

            <form id="profileForm" style="display:none;">
                <label>昵称<input name="nickname"></label>
                <label>联系方式（手机号）<input name="phone"></label>
                <label>邮箱<input name="email" type="email"></label>
                <div class="inline-field">
                    <label>邮箱验证码<input name="emailCode" maxlength="6" placeholder="6位数字"></label>
                    <button type="button" id="sendEmailCodeBtn">发送验证码</button>
                    <span id="emailCountdown" class="small"></span>
                </div>

                <div class="actions">
                    <button type="submit" id="saveBtn">保存资料</button>
                </div>
                <p class="form-message" id="profileMessage"></p>
            </form>

            <div class="profile-controls">
                <button type="button" id="editProfileBtn">修改资料</button>
                <button type="button" id="logoutBtn" class="secondary">退出登录</button>
            </div>
        </section>
    </main>

    <!-- Toast / confirm container -->
    <div id="confirmToast" class="toast" style="display:none;">
        <div class="toast-body">
            <div id="confirmToastMessage">确认操作吗？</div>
            <div class="toast-actions">
                <button id="confirmToastOk">确认</button>
                <button id="confirmToastCancel" class="secondary">取消</button>
            </div>
        </div>
    </div>

    <script src="assets/js/api.js"></script>
    <script src="assets/js/profile.js"></script>
</body>
</html>
